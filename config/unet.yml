# -----------------------------------------------------------------------------
# 基础与数据配置 (Base & Data)
# -----------------------------------------------------------------------------
device: "cuda"
seed: 42
num_workers: 4
pin_memory: true

data_dir: "d:/code/segment/dataset"
img_size: 256

# -----------------------------------------------------------------------------
# 模型配置 (Model)
# -----------------------------------------------------------------------------
model_type: "unet"
in_channels: 3
out_channels: 1
base_filters: 64
bilinear: true
threshold: 0.5
model_kwargs: {}

# -----------------------------------------------------------------------------
# 训练配置 (Train)
# -----------------------------------------------------------------------------
train:
  output_dir: "d:/code/segment/runs"
  run_name: "unet_isic2018"
  resume: ""
  batch_size: 8
  num_epochs: 80
  learning_rate: 0.0001
  weight_decay: 0.0001
  bce_weight: 0.5
  dice_weight: 0.5
  lr_scheduler: "cosine"
  min_lr: 0.000001
  step_size: 20
  step_gamma: 0.5
  use_amp: true
  log_interval: 5
  tb_num_images: 4
  tb_image_every: 5

# -----------------------------------------------------------------------------
# 评估配置 (Eval)
# -----------------------------------------------------------------------------
eval:
  run_dir: "d:/code/segment/runs/unet_isic2018"
  model_path: ""
  split: "test"
  batch_size: 8

# -----------------------------------------------------------------------------
# 推理配置 (Predict)
# -----------------------------------------------------------------------------
predict:
  run_dir: "d:/code/segment/runs/unet_isic2018"
  model_path: ""
  input_mode: "dir"
  input_dir: "d:/code/segment/dataset/ISIC2018_Task1-2_Test_Input"
  input_file: "d:/code/segment/dataset/ISIC2018_Task1-2_Validation_Input/ISIC_0012633.jpg"
  output_dir: "d:/code/segment/runs/unet_isic2018/predict"

# -----------------------------------------------------------------------------
# 导出可视化配置 (Export Visuals)
# -----------------------------------------------------------------------------
visualize:
  run_dir: "d:/code/segment/runs/unet_isic2018"
  model_path: ""
  split: "test"
  num_samples: 50
  output_dir: "d:/code/segment/runs/unet_isic2018/visualizations"
